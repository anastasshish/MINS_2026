syntax = "proto3";

option java_multiple_files = true;
option java_package = "ru.bmstu.grpc.reference";
option java_outer_classname = "ReferenceServiceProto";

package reference;

message TraceEnvelope {
  string trace_id = 1;
}

message GetPartByIdRequest {
  string trace_id = 1;
  int64 part_id = 2;
}

message ConsumePartRequest {
  string trace_id = 1;
  int64 part_id = 2;
  int32 amount = 3;
}

message CreatePartRequest {
  string trace_id = 1;
  string name = 2;
  double price = 3;
  int32 quantity_in_stock = 4;
}

message PartDto {
  int64 id = 1;
  string article = 2;
  string name = 3;
  double price = 4;
  int32 quantity_in_stock = 5;
}

message PartListResponse {
  repeated PartDto parts = 1;
}

service ReferenceService {
  rpc GetPartById(GetPartByIdRequest) returns (PartDto);
  rpc ListParts(TraceEnvelope) returns (PartListResponse);
  rpc CreatePart(CreatePartRequest) returns (PartDto);
  rpc ConsumePart(ConsumePartRequest) returns (TraceEnvelope);
}
